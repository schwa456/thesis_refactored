# configs/base_config.yaml

# ==========================================
# 0. 전역 설정 & 데이터 경로
# ==========================================
experiment_name: "base"
paths:
  data_dir: "data/raw/BIRD_dev"
  cache_dir: "data/processed"

# ==========================================
# 1. Graph Builder (스키마 -> 그래프 구축)
# ==========================================
graph_builder:
  name: "HeteroGraphBuilder"
  params:
    include_views: false
    run_leiden_clustering: true # 오프라인 커뮤니티 탐지 여부

# ==========================================
# 2. NLQ Encoder (자연어 임베딩)
# ==========================================
nlq_encoder:
  name: "APIEncoder"             # 또는 로컬 모델인 "LocalPLMEncoder"
  params:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    base_url: "http://localhost:8000/v1"  # vLLM 등을 띄웠을 경우 경로 (OpenAI면 생략 가능)

# ==========================================
# 3. Latent Space Projection (임베딩 공간 통일)
# ==========================================
projection:
  enabled: false

# ==========================================
# 4. Seed Node Selector (초기 후보 노드 선별)
# ==========================================
seed_selector:
  name: "VectorOnlySelector"
  params:
    top_k: 20

# ==========================================
# 5. Connectivity Extractor (구조적 연결성 확보)
# ==========================================
connectivity_extractor:
  name: "MSTExtractor"          

# ==========================================
# 6. Schema Filtering (최종 정제)
# ==========================================
filter:
  name: "None"

# ==========================================
# 7. SQL Generation (SQL 쿼리 생성)
# ==========================================
sql_generator:
  enabled: true
  name: "LLMSQLGenerator"
  params:
    llm_model: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
    temperature: 0.0