experiment_name: "preliminary_graph_and_agent"

# ==========================================
# 3. Latent Space Projection (임베딩 공간 통일)
# ==========================================
projection:
  enabled: false                # 투영을 할지 말지 토글!

seed_selector:
  name: "VectorOnlySelector"
  params:
    top_k: 15

connectivity_extractor:
  name: "MSTExtractor" 
  params:
    max_depth: 2

filter:
  name: "SingleAgentFilter"
  params:
    model_name: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
    temperature: 0.0