experiment_name: "baseline_linkalign"

# ==========================================
# 3. Latent Space Projection (임베딩 공간 통일)
# ==========================================
projection:
  enabled: false                # 투영을 할지 말지 토글!

seed_selector:
  name: "LinkAlignSelector"
  params:
    model_name: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
    top_k: 20
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

connectivity_extractor:
  name: "None" # LinkAlign은 GNN/Graph 탐색을 사용하지 않음

filter:
  name: "None"