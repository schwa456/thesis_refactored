experiment_name: "experiment_gat_classifier"

# 1. Encoding
nlq_encoder:
  name: "TokenEncoder"
  params:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"

# 2. Projection
projection:
  enabled: false

# 3. Selection
seed_selector:
  name: "GATClassifierSelector"
  params:
    hidden_dim: 256
    threshold: 0.5
    weight_path: "outputs/checkpoints/mlp_classifier_with_gat_train_best_recall.pt"

# 4. Extraction
connectivity_extractor:
  name: "None"

# 5. Filtering
filter:
  name: "None"

# 6. Generation
sql_generator:
  name: "LLMSQLGenerator"
  params:
    model_name: "meta-llama/Meta-Llama-3.1-8B-Instruct"